sonar.projectKey=JJDevHub
sonar.projectName=JJDevHub
sonar.projectVersion=1.0

sonar.sources=src/
sonar.tests=tests/

sonar.exclusions=**/wwwroot/**,**/node_modules/**,**/bin/**,**/obj/**,**/Migrations/**
sonar.coverage.exclusions=**/Migrations/**,**/Program.cs,**/DependencyInjection.cs,**/tests/**

sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml
sonar.cs.vstest.reportsPaths=**/*.trx
