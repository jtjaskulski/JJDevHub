# SonarQube / SonarScanner — analiza JJDevHub (Task 6.1)
# Uruchom z katalogu repo: sonar-scanner (wymaga SONAR_TOKEN i sonar.host.url)

sonar.projectKey=JJDevHub
sonar.projectName=JJDevHub
sonar.sourceEncoding=UTF-8

sonar.sources=src
sonar.tests=tests
sonar.exclusions=**/bin/**,**/obj/**,**/node_modules/**,**/dist/**,**/coverage/**

sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml
sonar.coverage.exclusions=**/Migrations/**,**/tests/**

sonar.javascript.lcov.reportPaths=src/Clients/web/coverage/lcov.info
