<div class="blog-list">
  <h1>Blog</h1>
  <p class="lede">
    Wpisów z Content API jeszcze nie ma — poniżej statyczne przykłady (zamiana na HTTP w kolejnym kroku backendu).
  </p>

  <div class="grid">
    @for (post of posts(); track post.slug) {
      <mat-card appearance="outlined" class="post-card">
        <mat-card-header>
          <mat-icon mat-card-avatar>article</mat-icon>
          <mat-card-title>{{ post.title }}</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <p>{{ post.excerpt }}</p>
        </mat-card-content>
        <mat-card-actions>
          <a mat-button color="primary" [routerLink]="['/blog', post.slug]">Czytaj</a>
        </mat-card-actions>
      </mat-card>
    }
  </div>
</div>
