<mat-toolbar color="primary" class="app-toolbar">
  <button mat-icon-button (click)="sidenav.toggle()">
    <mat-icon>menu</mat-icon>
  </button>
  <span class="toolbar-title">JJDevHub</span>
  <span class="spacer"></span>
  <nav class="desktop-nav">
    <a mat-button routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">
      <mat-icon>home</mat-icon> Home
    </a>
    <a mat-button routerLink="/work-experience" routerLinkActive="active-link">
      <mat-icon>work</mat-icon> Work Experience
    </a>
    <a mat-button routerLink="/about" routerLinkActive="active-link">
      <mat-icon>info</mat-icon> About
    </a>
  </nav>
</mat-toolbar>

<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #sidenav mode="over" class="sidenav">
    <mat-nav-list>
      <a mat-list-item routerLink="/" (click)="sidenav.close()"
         routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">
        <mat-icon matListItemIcon>home</mat-icon>
        <span matListItemTitle>Home</span>
      </a>
      <a mat-list-item routerLink="/work-experience" (click)="sidenav.close()"
         routerLinkActive="active-link">
        <mat-icon matListItemIcon>work</mat-icon>
        <span matListItemTitle>Work Experience</span>
      </a>
      <a mat-list-item routerLink="/about" (click)="sidenav.close()"
         routerLinkActive="active-link">
        <mat-icon matListItemIcon>info</mat-icon>
        <span matListItemTitle>About</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
