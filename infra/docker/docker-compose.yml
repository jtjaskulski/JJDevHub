services:
  # REVERSE PROXY
  nginx:
    image: nginx:alpine
    container_name: jjdevhub-nginx
    ports:
      - "8081:80"
      - "444:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - angular-web
      - content-api
      - analytics-api
      - identity-api
      - ai-gateway
      - notification-api
      - education-api
    restart: always
    networks:
      - jjdevhub-net

  # SECRETS MANAGEMENT
  vault:
    image: hashicorp/vault:latest
    container_name: jjdevhub-vault
    ports:
      - "8201:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "jjdevhub-root-token"
      VAULT_ADDR: "http://0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    networks:
      - jjdevhub-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: jjdevhub-keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8083:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
    networks:
      - jjdevhub-net

  # CI/CD
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jjdevhub-jenkins
    ports:
      - "8082:8080"
      - "50001:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    networks:
      - jjdevhub-net

  # WRITE DATABASE (Command Side - PostgreSQL)
  db:
    image: postgres:16-alpine
    container_name: jjdevhub-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: jjdevhub_content
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jjdevhub-net

  # READ DATABASE (Query Side - MongoDB)
  mongodb:
    image: mongo:latest
    container_name: jjdevhub-mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - jjdevhub-net

  # MESSAGE BROKER (CQRS Backbone)
  # Uwaga: cp-kafka/cp-zookeeper:latest wymaga KRaft (KAFKA_PROCESS_ROLES).
  # Wersja 7.6.x = klasyczny broker + Zookeeper — kompatybilny z obecnymi zmiennymi.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: jjdevhub-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - jjdevhub-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: jjdevhub-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - jjdevhub-net

  # CODE QUALITY - SONARQUBE
  sonarqube-db:
    image: postgres:16-alpine
    container_name: jjdevhub-sonarqube-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    networks:
      - jjdevhub-net

  sonarqube:
    image: sonarqube:lts-community
    container_name: jjdevhub-sonarqube
    depends_on:
      - sonarqube-db
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      - jjdevhub-net

  # MONITORING - PROMETHEUS
  prometheus:
    image: prom/prometheus:latest
    container_name: jjdevhub-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    restart: always
    networks:
      - jjdevhub-net

  # MONITORING - GRAFANA
  grafana:
    image: grafana/grafana:latest
    container_name: jjdevhub-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: always
    networks:
      - jjdevhub-net

  # OpenTelemetry traces (Jaeger UI :16686; OTLP gRPC :4317)
  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jjdevhub-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
    restart: always
    networks:
      - jjdevhub-net

  # ===================== APPLICATION SERVICES =====================
  # ASP.NET: Development here matches local `dotnet run` — OpenAPI where gated on
  # IsDevelopment(), clearer errors, appsettings.Development.json merges. Use
  # Production in deployment compose or a docker-compose.override.yml when you
  # need release-like behavior.

  # FRONTEND (Angular + Material)
  angular-web:
    build:
      context: ../../src/Clients/web
      dockerfile: Dockerfile
    container_name: jjdevhub-angular
    restart: always
    networks:
      - jjdevhub-net

  # CONTENT API (main bounded context)
  content-api:
    build:
      context: ../..
      dockerfile: src/Services/JJDevHub.Content/JJDevHub.Content.Api/Dockerfile
    container_name: jjdevhub-content-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__ContentDb: "Host=db;Port=5432;Database=jjdevhub_content;Username=postgres;Password=password"
      MongoDb__ConnectionString: "mongodb://mongodb:27017"
      MongoDb__DatabaseName: "jjdevhub_content_read"
      Kafka__BootstrapServers: "kafka:9092"
      Vault__Enabled: "false"
      Vault__Address: "http://jjdevhub-vault:8200"
      # Defaults match dev Vault (VAULT_DEV_ROOT_TOKEN_ID) and Keycloak realm import (jjdevhub-api secret).
      # Override via env or infra/docker/.env for non-dev setups.
      Vault__Token: "${VAULT_TOKEN:-jjdevhub-root-token}"
      Keycloak__realm: "jjdevhub"
      Keycloak__auth-server-url: "http://jjdevhub-keycloak:8080/"
      Keycloak__ssl-required: "none"
      Keycloak__resource: "jjdevhub-api"
      Keycloak__verify-token-audience: "false"
      Keycloak__credentials__secret: "${KEYCLOAK_CLIENT_SECRET:-jjdevhub-api-dev-secret}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
    depends_on:
      - db
      - mongodb
      - kafka
      - keycloak
      - jaeger
    restart: always
    networks:
      - jjdevhub-net

  # ANALYTICS API
  analytics-api:
    build:
      context: ../..
      dockerfile: src/Services/JJDevHub.Analytics/JJDevHub.Analytics.Api/Dockerfile
    container_name: jjdevhub-analytics-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    restart: always
    networks:
      - jjdevhub-net

  # IDENTITY API
  identity-api:
    build:
      context: ../..
      dockerfile: src/Services/JJDevHub.Identity/Dockerfile
    container_name: jjdevhub-identity-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    restart: always
    networks:
      - jjdevhub-net

  # AI GATEWAY
  ai-gateway:
    build:
      context: ../..
      dockerfile: src/Services/JJDevHub.AI.Gateway/JJDevHub.AI.Gateway/Dockerfile
    container_name: jjdevhub-ai-gateway
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    restart: always
    networks:
      - jjdevhub-net

  # NOTIFICATION API
  notification-api:
    build:
      context: ../..
      dockerfile: src/Services/JJDevHub.Notification/Dockerfile
    container_name: jjdevhub-notification-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    restart: always
    networks:
      - jjdevhub-net

  # EDUCATION API
  education-api:
    build:
      context: ../..
      dockerfile: src/Services/JJDevHub.Education/Dockerfile
    container_name: jjdevhub-education-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
    restart: always
    networks:
      - jjdevhub-net

  # SYNC WORKER (background service)
  sync-worker:
    build:
      context: ../..
      dockerfile: src/Services/JJDevHub.Sync/Dockerfile
    container_name: jjdevhub-sync-worker
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      MongoDb__ConnectionString: "mongodb://mongodb:27017"
      MongoDb__DatabaseName: "jjdevhub_content_read"
      Kafka__BootstrapServers: "kafka:9092"
    depends_on:
      - mongodb
      - kafka
    restart: always
    networks:
      - jjdevhub-net

networks:
  jjdevhub-net:
    driver: bridge

volumes:
  jenkins_home:
  postgres_data:
  mongo_data:
  sonarqube_db_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  prometheus_data:
  grafana_data:
