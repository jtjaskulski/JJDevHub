global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'jjdevhub-content-api'
    metrics_path: '/metrics'
    scrape_interval: 10s
    static_configs:
      - targets: ['jjdevhub-content-api:8080']
        labels:
          service: 'content-api'
          environment: 'docker'

  - job_name: 'jjdevhub-jenkins'
    metrics_path: '/prometheus'
    static_configs:
      - targets: ['jjdevhub-jenkins:8080']
        labels:
          service: 'jenkins'
